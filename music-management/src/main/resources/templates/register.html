    <!-- <h1 class="h3 mt-2 mb-3 font-weight-normal">BeautyYokohama | ユーザー登録</h3> -->

      <div class="min-vh-100 d-flex justify-content-center align-items-center">
    <form
      th:action="@{/register}"
      th:object="${userForm}"
      method="post"
      class="w-25 mx-auto"
    >
    <center><h4 class="text-white text-align: center mb-3">新規登録</h4></center>
      <div>
        <label for="username" class="sr-only"><font color="white">ユーザ名：</font></label>
        <input
          type="text"
          id="username"
          name="username"
          th:field="*{username}"
          class="form-control"
          placeholder="ユーザー名"
          required
          autofocus
        />
      </div>
      <div>
        <label for="password" class="sr-only"><font color="white">パスワード：</font></label>
        <!-- inputタグにminlength="8" maxlength="16"を入れるとよい -->
        <input
          type="password"
          id="password"
          name="password"
          th:field="*{password}"
          class="form-control"
          minlength="8"
          maxlength="16"
          placeholder="パスワード"
          required
        />
      </div>
      <div>
        <label for="userAddress"><font color="white">住所：</font></label>
        <input
          type="text"
          id="userAdress"
          name="userAddress"
          th:field="*{userAddress}"
          class="form-control"
          placeholder="住所"
        />
      </div>
      <div>
        <label for="userCheck"><font color="white">横浜市民の方はチェックお願い致します</font></label>
        <input
          type="checkbox"
          id="uesrCheck"
          name="userCheck"
          th:checked="*{userCheck}"
          class="form-check-input"
        />
      </div>
      <button type="submit" class="btn btn-outline-light my-1" value="登録">登録</button>

      <center><a th:href="@{/login}" class="nav-link text-white">ログインはこちらから</a></center>
    </form>
