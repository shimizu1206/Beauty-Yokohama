<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head(アルバム一覧 )}"></head>

<body>
    <div th:replace="~{layout :: header}"></div>
    <h3>横浜周辺店舗一覧 </h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>周辺店舗 </th>
                <th>住所 </th>
                <th>価格帯 </th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="yoyaku : ${yoyakus}">
                <td><span th:text="${yoyaku.yoyakuId}">yoyaku id</span></td>
                <td><a th:href="@{/yoyakus/{yoyakuId}(yoyakuId=${yoyaku.yoyakuId})}"><span th:text="${yoyaku.name1}">yoyaku name1</span></a></td>
                <td><span th:text="${yoyaku.zyusyo}">yoyaku zyusyo</span></td>
                <td><span th:text="${yoyaku.kakaku}">yoyaku kakaku</span></td>
            </tr>
        </tbody>
    </table>
    <div th:replace="~{layout :: footer}"></div>
</body>

</html>
