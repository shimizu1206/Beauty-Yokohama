<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{layout :: head(ログイン)}"></head>
  <body>
    <div th:replace="~{layout :: header}"></div>
    <form th:action="@{/login}" method="post" class="w-25 mx-auto">
      <div>
    <div th:if="${param.error}" style="color: red">
      ユーザ名、またはパスワードが違います
    </div>
    <div th:if="${param.register}" style="color: blue">登録に成功しました</div>

        <label for="username" class="sr-only">ユーザ名：</label>
        <input
          type="text"
          id="username"
          name="username"
          class="form-control"
          placeholder="ユーザID"
          required
          autofocus
        />
      </div>

      <div>
        <label for="password" class="sr-only">パスワード：</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="パスワード"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-outline-primary my-1"
        value="ログイン"
      >
        ログイン
      </button>
    </form>

    <div th:replace="~{layout :: footer}"></div>
  </body>
</html>
