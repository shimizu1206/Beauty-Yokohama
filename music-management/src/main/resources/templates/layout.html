<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
    <div th:fragment="header">
        <header style="background-color: #f8f8f8;">
            <h4>Beauty Ykohama </h4>
            <ul>
                <li sec:authorize="isAuthenticated()"><a th:href="@{/shops}">横浜周辺店舗一覧</a></li>
                <li sec:authorize="isAuthenticated()"><a th:href="@{/shop/Kutis}">確認画面 </a></li>
                <li sec:authorize="isAuthenticated()"><a th:href="@{/shops/reserved}">予約済み店舗 </a></li>
                <li sec:authorize="isAnonymous()"><a th:href="@{/register}">ユーザ登録</a></li>
                <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post">
                    <button type="submit">ログアウト</button>
                </form>
            </li>
            </ul>
        </header>
    </div>
    <div th:fragment="footer">
        <footer style="background-color: #f8f8f8; text-align: center;">
            <p>&copy; Beauty Yokohama </p>
        </footer>
    </div>
</body>

</html>
