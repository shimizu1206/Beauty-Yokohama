<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <title th:text="${title}">Title</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <link rel="icon" th:href="@{/image/kuma.png}">
  <link rel="stylesheet" th:href="@{/css/fuwa.css}" />
</head>

<body>
  <div th:fragment="header">
    <header style="background-color: rgba(255, 255, 255, 0)">
      <!-- <h4>Beauty Ykohama</h4> -->
      <!-- <ul>
          <li sec:authorize="isAuthenticated()">
            <a th:href="@{/shops}">横浜周辺店舗一覧</a>
          </li>
          <li sec:authorize="isAuthenticated()">
            <a th:href="@{/shops/reserved}">予約済み店舗 </a>
          </li>
          <li sec:authorize="isAnonymous()">
            <a th:href="@{/register}">ユーザ登録</a>
          </li>
          <li sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post">
              <button type="submit">ログアウト</button>
            </form>
          </li>
        </ul>  -->

      <!-- <div class="logo">
          <img th:src="@{/image/kuma.png}" />
        </div> -->

      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <div class="row">
            <ul class="nav mt-3">
              <li class="nav-item">
                <a class="nav-link text-white" th:href="@{/shops}"><img th:src="@{/image/beautyyokohama.png}" style="border-radius: 10px;" height="30" alt="Beauty Ykohama"></a>
              </li>
              <li class="nav-item active">
                <a class="nav-link text-white" th:href="@{/shops}">横浜周辺店舗一覧</a>
              </li>

              <li class="nav-item" sec:authorize="isAuthenticated()">
                <a class="nav-link text-white" th:href="@{/shops/reserved}">予約済み店舗</a>
              </li>

              <li class="nav-item" sec:authorize="isAnonymous()">
                <a class="nav-link text-white" th:href="@{/register}">ユーザ登録</a>
              </li>

              <li class="nav-item" sec:authorize="isAnonymous()">
                <a class="nav-link text-white" th:href="@{/login}">ログイン</a>
              </li>

              <li class="nav-item text-white" sec:authorize="isAuthenticated()">
                <!-- <a th:href="@{/logout}">ログアウト</a> -->
                <form th:action="@{/logout}" method="post">
                  <button class="btn btn-outline-light" type="submit">ログアウト</button>
                </form>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
  </div>

  <div th:fragment="footer">
    <footer style="background-color: rgba(255, 255, 255, 0); text-align: center">
      <p class="text-white">&copy; Beauty Yokohama</p>
    </footer>
  </div>
</body>

</html>
