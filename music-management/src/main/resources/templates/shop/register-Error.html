<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head(ユーザ登録)}"></head>

<body>
    <div th:replace="~{layout :: header}"></div>
    <form th:action="@{/register}" th:object="${userForm}" method="post" class="w-25 mx-auto">
        <div>
            <a class="text-white">すでに使用されているユーザー名です。<br>異なるユーザ名で作成してください</a><br>
            <label for="username" class="sr-only">ユーザ名：</label>
            <input type="text" id="username" name="username" th:field="*{username}" class="form-control"
                placeholder="ユーザー名" required autofocus />
        </div>
        <div>
            <label for="password" class="sr-only">パスワード：</label>
            <!-- inputタグにminlength="8" maxlength="16"を入れるとよい -->
            <input type="password" id="password" name="password" th:field="*{password}" class="form-control"
                minlength="8" maxlength="16" placeholder="パスワード" required />
        </div>
        <div>
            <label for="userAddress">住所：</label>
            <input type="text" id="userAdress" name="userAddress" th:field="*{userAddress}" class="form-control" />
        </div>
        <div>
            <label for="userCheck">横浜市民ですか？：</label>
            <input type="checkbox" id="uesrCheck" name="userCheck" th:checked="*{userCheck}" />
        </div>
        <button type="submit" class="btn btn-outline-primary my-1" value="登録">
            登録
        </button>
    </form>
    <div th:replace="~{layout :: footer}"></div>
</body>

</html>
