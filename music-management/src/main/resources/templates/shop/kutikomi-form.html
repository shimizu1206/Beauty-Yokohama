<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(アルバム一覧)}"></head> 
   <div th:replace="~{layout :: header}"></div> 
   <h3>アルバム登録</h3>

    <form th:action="@{/shops/kutis}" th:object="${KutiForm}" method="post">
       <div>
           <label for="age">タイトル：</label>
           <input type="text" id="age" name="age" th:field="*{age}">
       </div>
       <div>
           <label for="gender">アーティスト：</label>
           <input type="text" id="gender" name="gender" th:field="*{gender}">
       </div>
       <div>
           <label for="kansou">アーティスト：</label>
           <input type="text" id="kansou" name="kansou" th:field="*{kansou}">
       </div>
       <button type="submit">追加</button>
   </form>
   <div th:replace="~{layout :: footer}"></div>
</body>
</html>
