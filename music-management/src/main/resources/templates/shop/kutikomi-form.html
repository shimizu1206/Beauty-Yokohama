    <div class="container">
        <div class="row justify-content-center mx-2">
            <div class="col-9">
                <h3 class="c-pageHeading__title thin f-title f-400 text-white">REVIEW</h3>
            </div>
        </div>
        <div class="row justify-content-center m-2" th:each="kuti : ${Kutis}">
            <div class="col-9">
                <div class="card h-00 shadow-sm">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-sm-1"><b><span th:text="${kuti.age}">age</span></b></div>
                            <div class="col-sm-1"><b th:text="${kuti.gender}">男性</b></div>
                            <div class="col-sm-1"><b th:text="${kuti.evaluate}">5</b></div>
                        </div>
                        <div class="row">
                            <div class="col-10">
                                <p th:text="${kuti.kansou}">よかったです。</p>
                            </div>
                            <div class="col-2">
                                <form th:action="@{/shops/Kutis/{kutiId}/delete(kutiId=${kuti.kutiId})}" method="post">
                                    <button class="btn btn-danger" type="submit">削除</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 投稿 -->
        <section id="contact" class="py-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card shadow-sm">
                        <div class="card-body p-4 p-md-5">
                            <h2 class="fw-bold mb-4">レビューを投稿</h2>
                            <form th:action="@{/shops/Kutis/{shopId}(shopId=${shop.shopId})}" th:object="${KutiForms}"
                                method="post">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="age" class="form-label">年齢</label>
                                        <select class="form-select" id="age" name="age" th:field="*{age}" required>
                                            <option value="">-- 選択してください --</option>
                                            <option value="10代">10代</option>
                                            <option value="20代">20代</option>
                                            <option value="30代">30代</option>
                                            <option value="40代">40代</option>
                                            <option value="50代">50代</option>
                                            <option value="60代以上">60代以上</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label for="gender" class="form-label">性別</label>
                                        <select class="form-select" id="gender" name="gender" th:field="*{gender}">
                                            <option value="">選択</option>
                                            <option value="男性">男性</option>
                                            <option value="女性">女性</option>
                                            <option value="その他">その他</option>
                                        </select>
                                    </div>

                                    <div class="col-12">
                                        <label for="evaluate" class="form-label">評価</label>
                                        <input type="number" id="evaluate" name="evaluate" th:field="*{evaluate}"
                                            min="1" max="5">
                                    </div>

                                    <div class="col-12">
                                        <label for="kansou" class="form-label">内容</label>
                                        <textarea id="kansou" class="form-control" rows="5" placeholder="レビューを入力してください"
                                            required th:field="*{kansou}"></textarea>
                                    </div>

                                    <div>
                                        <input type="hidden" id="shopId" name="shopId" th:field="*{shopId}">
                                    </div>

                                    <div class="col-12 d-grid d-md-flex justify-content-md-end">
                                        <button type="submit" class="btn btn-primary px-4">投稿する</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="row justify-content-center m-2">
            <div class="col-9">
                <a th:href="@{/shops}">美容室詳細に戻る </a>
            </div>
        </div>

    </div>
    <div th:replace="~{layout :: footer}"></div>
</body>

</html>
