    <div class="mt-3 mb-4 px-2">
        <div class="container">
            <div class="row">
                <h3>商品一覧</h3>
            </div>
            <div class="row" th:each="item : ${items}">
                <div class="card h-100 shadow-sm m-2 p-3">
                    <div class="row">
                        <div class="col-3">
                            <img src="../../../../image/shampoo.png" alt="商品画像" height="100">
                        </div>
                        <div class="col-7">
                            <div class="row">
                                <b th:text="${item.itemName}">商品名</b>
                            </div>
                            <div class="row mt-3">
                                <p th:text="${item.features}">商品説明</p>
                            </div>
                        </div>
                        <div class="col-2">
                            <div class="row">
                                <div><span th:text="${item.price}">金額</span>円</div>
                            </div>
                            <div class="row mt-3">
                                ※数に限りがございます。
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{layout :: footer}"></div>
</body>
